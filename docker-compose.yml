version: "3.9"

########################### SERVICES
services:
  ########################### DAINF LABS CLIENT    
  dainf-labs-client-prod:        
    image: dainf/dainf-labs-client:prod
    container_name: dainf-labs-client-prod
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8098:8098"
    labels:
    # Traefik Config
      - "traefik.enable=true"
      - "traefik.http.routers.dainflabs.rule=Host(`dainf-labs.app.pb.utfpr.edu.br`)"
      - "traefik.http.routers.dainflabs.entrypoints=websecure"
      - "traefik.http.routers.dainflabs.tls.domains[0].main=app.pb.utfpr.edu.br"
      - "traefik.http.routers.dainflabs.tls.domains[0].sans=*.app.pb.utfpr.edu.br"
      - "traefik.http.routers.dainflabs.certresolver=letsencrypt"
    restart: unless-stopped
    networks:
      - web

########################### NETWORKS
networks:
  web:
    name: web
    driver: bridge
    external: true
    attachable: true
  database:
    name: database
    driver: bridge
    external: false
    attachable: true