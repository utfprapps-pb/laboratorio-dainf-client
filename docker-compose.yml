version: "3.9"

########################### SERVICES
services:
  ########################### DAINF LABS CLIENT    
  dainf-labs-client:        
    image: dainf/dainf-labs-client:prod
    container_name: dainf-labs-client
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "8098:80"
    labels:
    # Traefik Config
      - "traefik.enable=true"
      - "traefik.http.routers.dainflabs-client.rule=Host(`dainf-labs.app.pb.utfpr.edu.br`)"
      - "traefik.http.routers.dainflabs-client.entrypoints=websecure"
      - "traefik.http.routers.dainflabs-client.certresolver=letsencrypt"
    restart: unless-stopped
    networks:
      - web
      - database

########################### NETWORKS
networks:
  web:
    name: web
    driver: bridge
    external: true
    attachable: true
  database:
    name: database
    driver: bridge
    external: false
    attachable: true